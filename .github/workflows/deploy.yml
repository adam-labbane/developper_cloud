name: Deploy React Web App

# Déclencheurs : s'exécute à chaque push ou pull request sur main
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ── Job 1 : Build ──────────────────────────────────────────────────────────
  # Vérifie que le build fonctionne sur plusieurs versions de Node
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 19.x, 20.x, 21.x]

    steps:
      - name: 🏗 Setup repo
        uses: actions/checkout@v3

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: yarn

      - name: 📦 Install dependencies
        run: yarn install --ignore-engines

      - name: 🏗 Build web app
        run: yarn predeploy

  # ── Job 2 : Deploy ─────────────────────────────────────────────────────────
  # Déploie sur GitHub Pages uniquement lors d'un push sur main
  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 🏗 Setup repo
        uses: actions/checkout@v3

      - name: Use Node.js 20.x
        uses: actions/setup-node@v3
        with:
          node-version: 20.x
          cache: yarn

      - name: 📦 Install dependencies
        run: yarn install --ignore-engines

      - name: 🏗 Build web app
        run: yarn predeploy

      - name: 📤 Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
