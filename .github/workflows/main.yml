name: Deploy React Web App

on:
  push:
    branches: [ main ]        # à chaque push sur main
  pull_request:
    branches: [ main ]        # à chaque PR vers main

jobs:

  # 2. JOB "build" — compile l'app
  build:
    runs-on: ubuntu-latest  

    # 3. MATRIX 
    strategy:
      matrix:
        node-version: [18.x, 19.x, 20.x, 21.x]

    # 4. STEPS — les étapes du job
    steps:
      - name: Setup repo
        uses: actions/checkout@v3

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3 
        with:
          node-version: ${{ matrix.node-version }}
          cache: yarn

      - name: Install dependencies
        run: yarn install --ignore-engines  # installe les packages

      - name: Build web app
        run: yarn predeploy                 # lance expo export -p web

  # 5. JOB "deploy" — déploie sur GitHub Pages (seulement sur push main)
  deploy:
    needs: build              # attend que build soit OK
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Setup repo
        uses: actions/checkout@v3

      - name: Use Node.js 20.x
        uses: actions/setup-node@v3
        with:
          node-version: 20.x
          cache: yarn

      - name: Install dependencies
        run: yarn install --ignore-engines

      - name: Build web app
        run: yarn predeploy

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
